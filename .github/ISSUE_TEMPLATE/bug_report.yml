name: Bug report
description: Report something that is broken
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include API keys or `.env` contents.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. npm start
        2. Open http://localhost:3000
        3. ...
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 131, macOS 15

  - type: textarea
    id: logs
    attributes:
      label: Console or server errors
      description: Paste relevant errors (redact API keys).
